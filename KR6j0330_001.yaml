body:
  text: 南無救苦觀世音菩薩百千萬億佛恆河沙數佛無量功德佛佛告阿難言此經大聖能救獄囚能救重病能救千災百難苦若有人誦得一千遍一身離苦難誦得一萬遍合家離苦難南無佛力威南無佛力護使人無惡心令人身得度回光菩薩回善菩薩阿耨大天王正殿菩薩摩邱摩邱清淨比邱官事得散私事得休諸大菩薩五百羅漢救護弟子身悉皆離苦難自然觀世音纓絡不須解勤誦千萬遍災難自然得解脫信受奉行即説真言曰今菩今菩提陀羅尼帝尼佉羅帝菩提薩婆訶
